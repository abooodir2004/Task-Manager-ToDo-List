<div class="task-list">
  <h2>My Tasks</h2>
  <div *ngIf="tasks.length === 0" class="no-tasks">
    No tasks found. Add a new task!
  </div>
  <app-task-item 
    *ngFor="let task of tasks"
    [task]="task"
    (delete)="deleteTask($event)"
    (toggle)="toggleCompletion($event)">
  </app-task-item>
</div>
